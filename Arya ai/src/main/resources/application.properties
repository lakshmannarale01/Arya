# This tells Arya where to find your PostgreSQL database
spring.datasource.url=jdbc:postgresql://localhost:5432/arya_db
spring.datasource.username=postgres
spring.datasource.password=root

# This helps create the tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Using Groq as a free alternative
# 1. Disable the extra metadata that Groq rejects
spring.ai.openai.chat.options.proxy-tool-calls=false

# 2. Force the client to use a clean request body
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile

spring.ai.openai.base-url=https://api.groq.com/openai



spring.ai.openai.api-key=
